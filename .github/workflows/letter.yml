name: mood-letter
# 定期来信：每周日晚上 10:30（北京时间）
on:
  schedule:
    - cron: "30 14 * * 0"   # UTC 周日 14:30 = 北京时间周日 22:30
  workflow_dispatch: {}

jobs:
  letter:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Write letter
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LINGMOU_GPT_API_KEY: ${{ secrets.LINGMOU_GPT_API_KEY }}
        run: |
          cp config.example.yaml config.yaml
          python -m mood.run --task letter
