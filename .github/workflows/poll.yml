name: mood-poll
# 日常轮询：识别情绪 + 解析实体 + 按需回应 + 跑规则
#
# 触发方式：由外部定时器（cron-job.org）按精确时间调 workflow_dispatch API。
# 不用 GitHub 自带的 schedule —— 它是“尽力而为”，高峰常延迟数小时甚至跳过。
# 真正的兜底仍是 run.py 的自愈逻辑：某次没跑，下次会自动补上未处理的记录。
on:
  workflow_dispatch: {}

jobs:
  poll:
    runs-on: ubuntu-latest
    # 卡住 10 分钟自动失败，避免僵尸运行堆积。
    # 不再用 concurrency 串行化：那会让一次卡死的运行堵死后续所有触发；
    # 配合 run.py 的“失败不打勾”，即使偶尔重叠也不会重复处理同一条记录。
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run poll
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LINGMOU_GPT_API_KEY: ${{ secrets.LINGMOU_GPT_API_KEY }}
        run: |
          cp config.example.yaml config.yaml
          python -m mood.run --task all
