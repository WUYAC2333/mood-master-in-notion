name: mood-daily
# 每日总结：每晚 22:00（北京时间）由外部定时器 cron-job.org 触发，当天有记录才生成。
# 不用 GitHub schedule —— 它会延迟数小时，曾把“当晚 22:00”的总结拖到次日凌晨。
on:
  workflow_dispatch: {}

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Daily summary
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          LINGMOU_GPT_API_KEY: ${{ secrets.LINGMOU_GPT_API_KEY }}
        run: |
          cp config.example.yaml config.yaml
          python -m mood.run --task daily
